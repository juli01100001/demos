<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            height: 100vh;
            background-color: #fff;
            font-family: Arial, Helvetica, sans-serif;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; 
            pointer-events: none; 
        }

        section {
            padding: 2rem;
            position: relative;
            z-index: 1;
        }

        ul {
            list-style: lower-greek;
            list-style-position: inside;
            padding: 2rem 0;
        }

        a {
            text-decoration: none;
            color: #272727;
        }
        a:hover {
            color: rgba(0, 0, 0, 0.696);
        }
        ul li {
            font-size: 2rem;
        }

        h1 {
            font-size: 4rem;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>

<body>

    <div id="canvas-container"></div>

    <section>
        <h1>this is an index</h1>
        <ul>
            <a href="./mcc/index.html">
                <li>mcc</li>
            </a>
        </ul>
    </section>

    <script>
        
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 60;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        
        const sigma = 10;
        const rho = 28;
        const beta = 8 / 3;

        let x = 0.1;
        let y = 0;
        let z = 0;

        
        const palette = [
            new THREE.Color('#FFB7B2'), 
            new THREE.Color('#BFFCC6'), 
            new THREE.Color('#DED0F6')  
        ];
        let colorCounter = 0;

        
        function createCircleTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            
            
            ctx.beginPath();
            ctx.arc(32, 32, 28, 0, Math.PI * 2);
            ctx.fillStyle = '#000';
            ctx.fill();
            
            return new THREE.CanvasTexture(canvas);
        }

        
        const MAX_POINTS = 20000; 
        const geometry = new THREE.BufferGeometry();
        
        const positions = new Float32Array(MAX_POINTS * 3);
        const colors = new Float32Array(MAX_POINTS * 3); 

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        
        const material = new THREE.PointsMaterial({
            size: 0.2,
            map: createCircleTexture(),
            vertexColors: true,     
            transparent: true,
            opacity: 1,
            alphaTest: 0.1,        
            depthWrite: false
        });

        const particleSystem = new THREE.Points(geometry, material);
        particleSystem.position.y = 0; 
        scene.add(particleSystem);

        let currentPointIndex = 0;
        let mouseSpeed = 0;
        let lastMouseX = 0;
        let lastMouseY = 0;

        
        window.addEventListener('mousemove', (e) => {
            const dx = e.clientX - lastMouseX;
            const dy = e.clientY - lastMouseY;
            mouseSpeed = Math.sqrt(dx * dx + dy * dy);

            lastMouseX = e.clientX;
            lastMouseY = e.clientY;

            const pointsToCreate = Math.min(Math.floor(mouseSpeed * 0.6), 20);

            const posAttr = geometry.attributes.position;
            const colorAttr = geometry.attributes.color;

            for (let i = 0; i < pointsToCreate; i++) {
                const dt = 0.01;
                const dx = (sigma * (y - x)) * dt;
                const dy = (x * (rho - z) - y) * dt;
                const dz = (x * y - beta * z) * dt;
                
                x += dx;
                y += dy;
                z += dz;

                const idx = currentPointIndex * 3;
                
                
                posAttr.array[idx] = x;
                posAttr.array[idx + 1] = y;
                posAttr.array[idx + 2] = z;

                
                const currentColor = palette[colorCounter % palette.length];
                colorAttr.array[idx] = currentColor.r;
                colorAttr.array[idx + 1] = currentColor.g;
                colorAttr.array[idx + 2] = currentColor.b;

                colorCounter++;
                currentPointIndex = (currentPointIndex + 1) % MAX_POINTS;
            }
            
            
            posAttr.needsUpdate = true;
            colorAttr.needsUpdate = true;
        });

        
        function animate() {
            requestAnimationFrame(animate);

            
            particleSystem.rotation.y += 0.005;
            mouseSpeed *= 0.95;

            renderer.render(scene, camera);
        }

        animate();

        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
